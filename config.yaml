model_list:

  # DeepSeek Official
  - model_name: deepseek-official-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
      api_base: https://api.deepseek.com

  - model_name: deepseek-official-v4-flash
    litellm_params:
      model: deepseek/deepseek-v4-flash
      api_key: os.environ/DEEPSEEK_API_KEY
      api_base: https://api.deepseek.com

  # DeepSeek via DeepInfra
  - model_name: deepseek-deepinfra-v4-pro
    litellm_params:
      model: deepinfra/deepseek-ai/DeepSeek-V4-Pro
      api_key: os.environ/DEEPINFRA_API_KEY

  - model_name: deepseek-deepinfra-v4-flash
    litellm_params:
      model: deepinfra/deepseek-ai/DeepSeek-V4-0-Flash
      api_key: os.environ/DEEPINFRA_API_KEY

  # Google Gemini (AI Studio)
  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-3.1-flash-lite
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

litellm_settings:
  drop_params: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
